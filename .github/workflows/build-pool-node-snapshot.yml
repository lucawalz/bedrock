name: build-pool-node-snapshot

on:
  push:
    branches: [main]
    paths:
      - flake.nix
      - flake.lock
      - modules/k3s/pool-node.nix
      - modules/k3s/hetzner-scaffolding.nix
      - infra/packer/**
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: node-snapshot-build
  cancel-in-progress: false

env:
  SNAPSHOT_RETENTION: "3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: hashicorp/setup-packer@v3
        with:
          version: "~1.11"

      - name: Compute nixos config tree hash
        id: hash
        run: |
          echo "nixos_hash=$(printf '%s\n' \
            $(git rev-parse HEAD:flake.nix) \
            $(git rev-parse HEAD:flake.lock) \
            $(git rev-parse HEAD:modules/k3s/pool-node.nix) \
            $(git rev-parse HEAD:modules/k3s/hetzner-scaffolding.nix) \
            $(git rev-parse HEAD:infra/packer) \
            | sha256sum | cut -c1-40)" >> $GITHUB_OUTPUT

      - name: Check for existing snapshot
        id: check
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          COUNT=$(curl -sf -G \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            --data-urlencode "type=snapshot" \
            --data-urlencode "label_selector=bedrock-role=pool-node,bedrock-nixos-hash=${{ steps.hash.outputs.nixos_hash }}" \
            "https://api.hetzner.cloud/v1/images" \
            | jq '.images | length')
          echo "exists=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Generate ephemeral SSH key
        if: steps.check.outputs.exists != 'true'
        run: ssh-keygen -t ed25519 -f /tmp/packer_key -N ""

      - name: Packer init
        if: steps.check.outputs.exists != 'true'
        working-directory: infra/packer
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: packer init .

      - name: Build snapshot
        if: steps.check.outputs.exists != 'true'
        working-directory: infra/packer
        env:
          PKR_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          PKR_VAR_nixos_commit_sha: ${{ github.sha }}
          PKR_VAR_nixos_hash: ${{ steps.hash.outputs.nixos_hash }}
          PKR_VAR_ssh_private_key_file: /tmp/packer_key
        run: packer build -only=hcloud.pool-node .

  cleanup:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - uses: actions/checkout@v7

      - name: Cleanup leaked packer ssh keys
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          IDS=$(curl -sf -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/ssh_keys?per_page=50" \
            | jq -r '.ssh_keys[] | select(.name | startswith("packer-")) | .id')
          for ID in $IDS; do
            curl -sf -X DELETE -H "Authorization: Bearer $HCLOUD_TOKEN" \
              "https://api.hetzner.cloud/v1/ssh_keys/$ID"
          done

      - name: Cleanup leaked packer servers
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          IDS=$(curl -sf -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?per_page=50" \
            | jq -r '.servers[] | select(.name | startswith("packer-")) | .id')
          for ID in $IDS; do
            curl -sf -X DELETE -H "Authorization: Bearer $HCLOUD_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/$ID"
          done

      - name: Verify current snapshot exists
        id: verify
        if: needs.build.result == 'success'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          CURRENT_HASH=$(printf '%s\n' \
            $(git rev-parse HEAD:flake.nix) \
            $(git rev-parse HEAD:flake.lock) \
            $(git rev-parse HEAD:modules/k3s/pool-node.nix) \
            $(git rev-parse HEAD:modules/k3s/hetzner-scaffolding.nix) \
            $(git rev-parse HEAD:infra/packer) \
            | sha256sum | cut -c1-40)
          COUNT=$(curl -sf -G \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            --data-urlencode "type=snapshot" \
            --data-urlencode "label_selector=bedrock-role=pool-node,bedrock-nixos-hash=${CURRENT_HASH}" \
            "https://api.hetzner.cloud/v1/images" \
            | jq '.images | length')
          if [ "$COUNT" -lt 1 ]; then
            echo "no snapshot found for current hash ${CURRENT_HASH}; refusing to prune" >&2
            exit 1
          fi
          echo "current_hash=${CURRENT_HASH}" >> $GITHUB_OUTPUT

      - name: Promote current snapshot for CAPH selection
        if: steps.verify.outcome == 'success'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          CURRENT_HASH: ${{ steps.verify.outputs.current_hash }}
        run: |
          images=$(curl -sf -G \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            --data-urlencode "type=snapshot" \
            --data-urlencode "label_selector=bedrock-role=pool-node,bedrock-managed=true" \
            --data-urlencode "sort=created:desc" \
            "https://api.hetzner.cloud/v1/images?per_page=50")
          relabel() {
            curl -sf -X PUT -H "Authorization: Bearer $HCLOUD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"labels\": $2}" \
              "https://api.hetzner.cloud/v1/images/$1" >/dev/null
          }
          selected=$(echo "$images" | jq -r --arg hash "$CURRENT_HASH" \
            'first(.images[] | select(.labels["bedrock-nixos-hash"] == $hash) | .id) // empty')
          if [ -z "$selected" ]; then
            echo "no current-hash snapshot to promote" >&2
            exit 1
          fi
          labels=$(echo "$images" | jq -c --argjson id "$selected" \
            '(.images[] | select(.id == $id) | .labels) + {"caph-image-name": "bedrock-pool-node"}')
          relabel "$selected" "$labels"
          for id in $(echo "$images" | jq -r --argjson sel "$selected" \
            '.images[] | select(.id != $sel and (.labels | has("caph-image-name"))) | .id'); do
            labels=$(echo "$images" | jq -c --argjson id "$id" \
              '(.images[] | select(.id == $id) | .labels) | del(.["caph-image-name"])')
            relabel "$id" "$labels"
          done

      - name: Prune duplicate and stale snapshots
        if: steps.verify.outcome == 'success'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          CURRENT_HASH: ${{ steps.verify.outputs.current_hash }}
        run: |
          DELETE_IDS=$(curl -sf -G \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            --data-urlencode "type=snapshot" \
            --data-urlencode "label_selector=bedrock-role=pool-node,bedrock-managed=true" \
            --data-urlencode "sort=created:desc" \
            "https://api.hetzner.cloud/v1/images?per_page=50" \
            | jq -r --arg hash "$CURRENT_HASH" --argjson keep "${SNAPSHOT_RETENTION}" '
              ([.images[] | select(.labels["bedrock-nixos-hash"] == $hash)] | .[1:] | .[].id),
              ([.images[] | select(.labels["bedrock-nixos-hash"] != $hash)] | .[($keep - 1):] | .[].id)
            ')
          for ID in $DELETE_IDS; do
            curl -sf -X DELETE -H "Authorization: Bearer $HCLOUD_TOKEN" \
              "https://api.hetzner.cloud/v1/images/$ID"
          done
