name: renovate-validate

on:
  pull_request:
    paths:
      - renovate.json
      - .github/renovate.json5

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Validate renovate config
        run: npx --yes renovate-config-validator
