rule_files:
  - slo-blog-rules.gen.yaml

evaluation_interval: 1m

tests:
  - interval: 1m
    name: availability fast burn fires and error budget computes
    input_series:
      - series: 'traefik_router_requests_total{router="blog-blog-abc123@kubernetescrd", code="200"}'
        values: '0+95x90'
      - series: 'traefik_router_requests_total{router="blog-blog-abc123@kubernetescrd", code="500"}'
        values: '0+5x90'
    promql_expr_test:
      - expr: slo:blog_availability:error_ratio{window="5m"}
        eval_time: 70m
        exp_samples:
          - labels: 'slo:blog_availability:error_ratio{window="5m"}'
            value: 0.05
      - expr: slo:blog_availability:error_ratio{window="1h"}
        eval_time: 70m
        exp_samples:
          - labels: 'slo:blog_availability:error_ratio{window="1h"}'
            value: 0.05
    alert_rule_test:
      - alertname: BlogAvailabilityErrorBudgetBurnFast
        eval_time: 70m
        exp_alerts:
          - exp_labels:
              severity: critical
              slo: blog-availability
            exp_annotations:
              summary: "Blog availability error budget burning fast (14.4x)"
              description: "The blog is burning its 30d availability error budget at 14.4x over 1h and 5m windows; the budget will be exhausted in about two days."

  - interval: 1m
    name: availability healthy does not fire and budget near full
    input_series:
      - series: 'traefik_router_requests_total{router="blog-blog-abc123@kubernetescrd", code="200"}'
        values: '0+99.95x4400'
      - series: 'traefik_router_requests_total{router="blog-blog-abc123@kubernetescrd", code="500"}'
        values: '0+0.05x4400'
    promql_expr_test:
      - expr: round(slo:blog_availability:error_budget_remaining_ratio, 0.01)
        eval_time: 60m
        exp_samples:
          - labels: '{}'
            value: 0.5
    alert_rule_test:
      - alertname: BlogAvailabilityErrorBudgetBurnFast
        eval_time: 60m
        exp_alerts: []
      - alertname: BlogAvailabilityErrorBudgetBurnSlow
        eval_time: 60m
        exp_alerts: []

  - interval: 1m
    name: latency fast burn fires when slow fraction exceeds threshold
    input_series:
      - series: 'traefik_router_request_duration_seconds_bucket{router="blog-blog-abc123@kubernetescrd", le="0.5"}'
        values: '0+80x90'
      - series: 'traefik_router_request_duration_seconds_bucket{router="blog-blog-abc123@kubernetescrd", le="+Inf"}'
        values: '0+100x90'
      - series: 'traefik_router_request_duration_seconds_count{router="blog-blog-abc123@kubernetescrd"}'
        values: '0+100x90'
    promql_expr_test:
      - expr: round(slo:blog_latency:error_ratio{window="5m"}, 0.01)
        eval_time: 70m
        exp_samples:
          - labels: '{window="5m"}'
            value: 0.2
    alert_rule_test:
      - alertname: BlogLatencyErrorBudgetBurnFast
        eval_time: 70m
        exp_alerts:
          - exp_labels:
              severity: critical
              slo: blog-latency
            exp_annotations:
              summary: "Blog latency error budget burning fast (14.4x)"
              description: "Requests to the blog slower than 500ms are burning the 30d latency error budget at 14.4x over 1h and 5m windows."
