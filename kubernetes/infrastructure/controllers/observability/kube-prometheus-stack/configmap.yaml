apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-values
  namespace: monitoring
data:
  values.yaml: |
    # kube-prometheus-stack Helm values
    # See: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

    # Reduce resource usage for homelab
    prometheus:
      prometheusSpec:
        retention: 7d
        retentionSize: 17GiB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
        resources:
          requests:
            cpu: "200m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "3Gi"
        additionalScrapeConfigs:
          - job_name: pi-router
            scrape_interval: 30s
            static_configs:
              - targets:
                  - "10.20.0.1:9100"
            relabel_configs:
              - source_labels: [__address__]
                target_label: instance
                replacement: pi-router

    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false

    defaultRules:
      rules:
        kubeApiserverBurnrate: false
        kubeApiserverSlos: false

    grafana:
      enabled: true
      grafana.ini:
        auth.anonymous:
          enabled: true
          org_role: Viewer
      image:
        tag: "11.2.3"
      deploymentStrategy:
        type: Recreate
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password

      persistence:
        enabled: true
        size: 10Gi
        storageClassName: longhorn

      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
          jsonData:
            derivedFields:
              - name: TraceID
                matcherType: label
                matcherRegex: traceID
                datasourceUid: tempo
                url: "$${__value.raw}"
        - name: Tempo
          type: tempo
          uid: tempo
          access: proxy
          url: http://tempo.monitoring.svc.cluster.local:3200
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              spanStartTimeShift: "-1h"
              spanEndTimeShift: "1h"
              filterByTraceID: true
              filterBySpanID: false
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true

      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboards:
        default:
          node-exporter-full:
            gnetId: 1860
            revision: 45
            datasource: Prometheus
          loki-logs:
            gnetId: 13639
            revision: 2
            datasource: Loki
          traefik:
            gnetId: 17346
            revision: 9
            datasource: Prometheus
          cert-manager:
            gnetId: 11001
            revision: 1
            datasource: Prometheus

      alerting:
        contactpoints.yaml:
          apiVersion: 1
          contactPoints:
            - orgId: 1
              name: ntfy
              receivers:
                - uid: ntfy_webhook
                  type: webhook
                  settings:
                    url: "http://ntfy.ntfy.svc.cluster.local/alerts?tpl=yes&title=%7B%7B.title%7D%7D&message=%7B%7B.message%7D%7D"
                    httpMethod: POST
        policies.yaml:
          apiVersion: 1
          policies:
            - orgId: 1
              receiver: ntfy
              group_by: ['grafana_folder', 'alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
        rules.yaml:
          apiVersion: 1
          groups:
            - orgId: 1
              name: logs
              folder: Homelab
              interval: 1m
              rules:
                - uid: loki-error-spike
                  title: HighLogErrorRate
                  condition: C
                  for: 5m
                  noDataState: OK
                  execErrState: Error
                  labels:
                    severity: warning
                  annotations:
                    summary: 'High error log rate in {{ "{{ $labels.namespace }}" }}'
                  data:
                    - refId: A
                      relativeTimeRange:
                        from: 300
                        to: 0
                      datasourceUid: loki
                      model:
                        refId: A
                        datasource:
                          type: loki
                          uid: loki
                        expr: 'sum by (namespace) (count_over_time({namespace=~".+"} |~ `(?i:level=error|"level":"error")|\bERROR\b` [5m]))'
                        queryType: instant
                    - refId: C
                      datasourceUid: __expr__
                      model:
                        refId: C
                        type: threshold
                        datasource:
                          type: __expr__
                          uid: __expr__
                        expression: A
                        conditions:
                          - evaluator:
                              type: gt
                              params: [50]

    alertmanager:
      enabled: true
      alertmanagerSpec:
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: 'ntfy'
          group_by: ['alertname', 'severity']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: 'null'
              matchers:
                - alertname =~ "InfoInhibitor|Watchdog"
        receivers:
          - name: 'null'
          - name: 'ntfy'
            webhook_configs:
              - url: 'http://ntfy.ntfy.svc.cluster.local/alerts?tpl=yes&title=%7B%7B.status%20%7C%20upper%7D%7D%3A%20%7B%7B.commonLabels.alertname%7D%7D%20%28%7B%7Blen%20.alerts%7D%7D%29&message=%7B%7B.commonLabels.severity%7D%7D%20%7C%20%7B%7B.commonAnnotations.summary%20%7C%20trunc%20200%7D%7D'
                send_resolved: true
        inhibit_rules:
          - source_matchers:
              - severity = critical
            target_matchers:
              - severity =~ warning|info
            equal:
              - namespace
              - alertname