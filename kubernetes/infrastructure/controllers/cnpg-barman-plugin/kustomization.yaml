apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - manifest.yaml
  - networkpolicies.yaml
patches:
  - target:
      kind: Deployment
      name: barman-cloud
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: barman-cloud
      spec:
        template:
          spec:
            containers:
              - name: barman-cloud
                resources:
                  requests:
                    cpu: 100m
                    memory: 100Mi
                  limits:
                    memory: 200Mi
