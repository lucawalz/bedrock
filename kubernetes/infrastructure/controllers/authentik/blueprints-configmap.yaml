apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  github.yaml: |
    version: 1
    metadata:
      name: github-oauth-source
    entries:
      - model: authentik_sources_oauth.oauthsource
        identifiers:
          slug: github
        attrs:
          name: GitHub
          provider_type: github
          consumer_key: !Env GITHUB_CLIENT_ID
          consumer_secret: !Env GITHUB_CLIENT_SECRET
          additional_scopes: "user:email read:org"
          enrollment_flow: !Find [authentik_flows.flow, [slug, github-enrollment]]
          authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
  github-enrollment.yaml: |
    version: 1
    metadata:
      name: github-internal-enrollment
    entries:
      - model: authentik_stages_user_write.userwritestage
        id: enrollment-write-stage
        identifiers:
          name: github-enrollment-write
        attrs:
          user_type: internal
          user_creation_mode: always_create
          create_users_as_inactive: false
      - model: authentik_stages_deny.denystage
        id: enrollment-deny-stage
        identifiers:
          name: github-enrollment-deny
        attrs:
          deny_message: "This authentik instance is restricted to a single account."
      - model: authentik_policies_expression.expressionpolicy
        id: restrict-github-policy
        identifiers:
          name: restrict-github-single-user
        attrs:
          expression: |
            ui = request.context.get("oauth_userinfo") or {}
            pd = request.context.get("prompt_data") or {}
            pu = request.context.get("pending_user")
            candidates = [ui.get("login"), pd.get("username"), getattr(pu, "username", None)]
            return "lucawalz" not in [c for c in candidates if c]
      - model: authentik_flows.flow
        id: enrollment-flow
        identifiers:
          slug: github-enrollment
        attrs:
          name: GitHub Enrollment
          title: GitHub Enrollment
          designation: enrollment
          authentication: none
      - model: authentik_flows.flowstagebinding
        id: enrollment-deny-binding
        identifiers:
          target: !KeyOf enrollment-flow
          order: 0
        attrs:
          stage: !KeyOf enrollment-deny-stage
          evaluate_on_plan: true
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf enrollment-flow
          order: 1
        attrs:
          stage: !Find [authentik_stages_prompt.promptstage, [name, default-source-enrollment-prompt]]
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf enrollment-flow
          order: 2
        attrs:
          stage: !KeyOf enrollment-write-stage
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf enrollment-flow
          order: 3
        attrs:
          stage: !Find [authentik_stages_user_login.userloginstage, [name, default-source-enrollment-login]]
      - model: authentik_policies.policybinding
        identifiers:
          target: !KeyOf enrollment-deny-binding
          policy: !KeyOf restrict-github-policy
          order: 0
        attrs:
          enabled: true
  github-identification.yaml: |
    version: 1
    metadata:
      name: github-identification-binding
    entries:
      - model: authentik_stages_identification.identificationstage
        identifiers:
          name: default-authentication-identification
        attrs:
          show_source_labels: true
          user_fields:
            - email
            - username
          sources:
            - !Find [authentik_core.source, [slug, authentik-built-in]]
            - !Find [authentik_core.source, [slug, github]]
  forward-auth.yaml: |
    version: 1
    metadata:
      name: forward-auth-dashboards
    entries:
      - model: authentik_providers_proxy.proxyprovider
        id: prov-flux
        identifiers:
          name: flux-forward-auth
        attrs:
          name: flux-forward-auth
          mode: forward_domain
          external_host: https://flux.syslabs.dev
          cookie_domain: .syslabs.dev
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        id: app-flux
        identifiers:
          slug: flux
        attrs:
          name: Flux
          slug: flux
          provider: !KeyOf prov-flux
      - model: authentik_providers_proxy.proxyprovider
        id: prov-traefik
        identifiers:
          name: traefik-forward-auth
        attrs:
          name: traefik-forward-auth
          mode: forward_domain
          external_host: https://traefik.syslabs.dev
          cookie_domain: .syslabs.dev
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        id: app-traefik
        identifiers:
          slug: traefik
        attrs:
          name: Traefik
          slug: traefik
          provider: !KeyOf prov-traefik
      - model: authentik_providers_proxy.proxyprovider
        id: prov-prometheus
        identifiers:
          name: prometheus-forward-auth
        attrs:
          name: prometheus-forward-auth
          mode: forward_domain
          external_host: https://prometheus.syslabs.dev
          cookie_domain: .syslabs.dev
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        id: app-prometheus
        identifiers:
          slug: prometheus
        attrs:
          name: Prometheus
          slug: prometheus
          provider: !KeyOf prov-prometheus
      - model: authentik_providers_proxy.proxyprovider
        id: prov-alertmanager
        identifiers:
          name: alertmanager-forward-auth
        attrs:
          name: alertmanager-forward-auth
          mode: forward_domain
          external_host: https://alertmanager.syslabs.dev
          cookie_domain: .syslabs.dev
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        id: app-alertmanager
        identifiers:
          slug: alertmanager
        attrs:
          name: Alertmanager
          slug: alertmanager
          provider: !KeyOf prov-alertmanager
      - model: authentik_providers_proxy.proxyprovider
        id: prov-longhorn
        identifiers:
          name: longhorn-forward-auth
        attrs:
          name: longhorn-forward-auth
          mode: forward_domain
          external_host: https://longhorn.syslabs.dev
          cookie_domain: .syslabs.dev
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        id: app-longhorn
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          slug: longhorn
          provider: !KeyOf prov-longhorn
      - model: authentik_providers_proxy.proxyprovider
        id: prov-homepage
        identifiers:
          name: homepage-forward-auth
        attrs:
          name: homepage-forward-auth
          mode: forward_domain
          external_host: https://home.syslabs.dev
          cookie_domain: .syslabs.dev
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        id: app-homepage
        identifiers:
          slug: homepage
        attrs:
          name: Homepage
          slug: homepage
          provider: !KeyOf prov-homepage
      - model: authentik_providers_proxy.proxyprovider
        id: prov-rackpeek
        identifiers:
          name: rackpeek-forward-auth
        attrs:
          name: rackpeek-forward-auth
          mode: forward_domain
          external_host: https://rackpeek.syslabs.dev
          cookie_domain: .syslabs.dev
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        id: app-rackpeek
        identifiers:
          slug: rackpeek
        attrs:
          name: RackPeek
          slug: rackpeek
          provider: !KeyOf prov-rackpeek
      - model: authentik_providers_proxy.proxyprovider
        id: prov-litellm
        identifiers:
          name: litellm-forward-auth
        attrs:
          name: litellm-forward-auth
          mode: forward_domain
          external_host: https://litellm.syslabs.dev
          cookie_domain: .syslabs.dev
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        id: app-litellm
        identifiers:
          slug: litellm
        attrs:
          name: LiteLLM
          slug: litellm
          provider: !KeyOf prov-litellm
      - model: authentik_outposts.outpost
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          config:
            authentik_host: https://auth.syslabs.dev
          providers:
            - !KeyOf prov-flux
            - !KeyOf prov-traefik
            - !KeyOf prov-prometheus
            - !KeyOf prov-alertmanager
            - !KeyOf prov-longhorn
            - !KeyOf prov-rackpeek
            - !KeyOf prov-homepage
            - !KeyOf prov-litellm
