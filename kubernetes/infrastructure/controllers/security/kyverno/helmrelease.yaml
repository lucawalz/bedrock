apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: kyverno
      version: "3.8.2"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    config:
      resourceFiltersIncludeNamespaces:
        - kube-system
        - kube-node-lease
        - kube-public
        - flux-system
        - kyverno
        - cnpg-system
        - cert-manager
        - longhorn-system
        - metallb-system
        - monitoring
        - velero
        - cattle-*
        - fleet-*
        - cluster-fleet-*
        - p-*
        - user-*
        - local
    admissionController:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    backgroundController:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    cleanupController:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    reportsController:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    features:
      policyReports:
        enabled: true
      admissionReports:
        enabled: true
      backgroundScan:
        skipResourceFilters: false
      omitEvents:
        eventTypes:
          - PolicyApplied
          - PolicySkipped
          - PolicyViolation
