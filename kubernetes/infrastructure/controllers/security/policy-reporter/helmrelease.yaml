apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
  namespace: kyverno
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: policy-reporter
      version: "3.8.1"
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    metrics:
      enabled: true
    plugin:
      kyverno:
        enabled: true
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
    ui:
      enabled: false
    monitoring:
      enabled: true
      serviceMonitor:
        labels:
          release: kube-prometheus-stack
      grafana:
        namespace: monitoring
        dashboards:
          enabled: true
          label: grafana_dashboard
          value: "1"
