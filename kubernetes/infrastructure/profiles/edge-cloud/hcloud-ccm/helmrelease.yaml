apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hcloud-cloud-controller-manager
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: hcloud-cloud-controller-manager
      version: "1.26.0"
      sourceRef:
        kind: HelmRepository
        name: hetzner
        namespace: flux-system
  values:
    networking:
      enabled: false
    env:
      HCLOUD_TOKEN:
        valueFrom:
          secretKeyRef:
            name: hcloud
            key: token
      HCLOUD_LOAD_BALANCERS_ENABLED:
        value: "true"
