apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: postgres
spec:
  instances: 3
  inheritedMetadata:
    labels:
      velero.io/exclude-from-backup: "true"
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: preferred
  enableSuperuserAccess: true
  storage:
    size: 8Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi
  bootstrap:
    initdb:
      database: app
      owner: app
  managed:
    roles:
      - name: authentik
        login: true
        passwordSecret:
          name: pg-authentik
      - name: paperless
        login: true
        passwordSecret:
          name: pg-paperless
      - name: litellm
        login: true
        passwordSecret:
          name: pg-litellm
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: postgres-hetzner
