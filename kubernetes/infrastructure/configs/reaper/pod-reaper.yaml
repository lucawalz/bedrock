apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reaper
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-reaper
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-reaper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pod-reaper
subjects:
  - kind: ServiceAccount
    name: pod-reaper
    namespace: longhorn-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pod-reaper
  namespace: longhorn-system
spec:
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: pod-reaper
        spec:
          serviceAccountName: pod-reaper
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pod-reaper
              image: alpine/k8s:1.35.2
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  for phase in Succeeded Failed; do
                    kubectl get pods -A --field-selector "status.phase==$phase" \
                      -o 'jsonpath={range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' \
                      | while read -r ns name; do
                          [ -n "$name" ] || continue
                          echo "deleting $phase pod $ns/$name"
                          kubectl delete pod -n "$ns" "$name" --wait=false
                        done
                  done
