apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-autoscaler
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  targetNamespace: kube-system
  chart:
    spec:
      chart: cluster-autoscaler
      version: "9.58.0"
      sourceRef:
        kind: HelmRepository
        name: cluster-autoscaler
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    # tag must track the EKS control-plane minor in aws-1/cluster.yaml or DRA version-skew breaks scaling
    image:
      repository: registry.k8s.io/autoscaling/cluster-autoscaler
      tag: "v1.33.4"
    cloudProvider: aws
    awsRegion: eu-central-1
    autoDiscovery:
      clusterName: aws-1
    rbac:
      serviceAccount:
        name: cluster-autoscaler-aws-cluster-autoscaler
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::867344464550:role/bedrock-eks-cluster-autoscaler
    extraArgs:
      scale-down-enabled: true
      scale-down-delay-after-add: 3m
      scale-down-unneeded-time: 3m
      balance-similar-node-groups: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
