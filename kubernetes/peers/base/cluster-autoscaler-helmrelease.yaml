apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-autoscaler
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  targetNamespace: kube-system
  chart:
    spec:
      chart: cluster-autoscaler
      version: "9.57.0"
      sourceRef:
        kind: HelmRepository
        name: cluster-autoscaler
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    cloudProvider: aws
    awsRegion: eu-central-1
    autoDiscovery:
      clusterName: aws-1
    rbac:
      serviceAccount:
        name: cluster-autoscaler-aws-cluster-autoscaler
        annotations:
          # <ACCOUNT_ID> filled at stand-up; trust policy bound to the cluster OIDC issuer
          eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/bedrock-eks-cluster-autoscaler
    extraArgs:
      scale-down-enabled: true
      scale-down-delay-after-add: 10m
      scale-down-unneeded-time: 10m
      balance-similar-node-groups: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
