---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ash-region
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/regions/ash
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ash-base
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/infrastructure/base
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: ash-region
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: region-ash
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ash-edge
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/infrastructure/profiles/edge-cloud
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: ash-region
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: region-ash
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ash-apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/blog/overlays/edge-cloud
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: ash-base
    - name: ash-edge
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: region-ash
