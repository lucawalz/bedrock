apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true
    traefik: true

  settings.yaml: |
    title: syslabs
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      AI:
        style: row
        columns: 2
      Apps:
        style: row
        columns: 3
      Observability:
        style: row
        columns: 3
      Platform:
        style: row
        columns: 3
      Network:
        style: row
        columns: 2

  docker.yaml: ""

  custom.css: ""

  custom.js: ""

  bookmarks.yaml: |
    - Cluster:
        - Rancher:
            - icon: rancher.png
              href: https://rancher.syslabs.dev
        - Grafana:
            - icon: grafana.png
              href: https://grafana.syslabs.dev
    - Cluster ops:
        - Rancher Cluster Management:
            - icon: rancher.png
              href: https://rancher.syslabs.dev/dashboard/c/local/manager/provisioning.cattle.io.cluster
        - bedrock:
            - icon: github.png
              href: https://github.com/lucawalz/bedrock
        - horizon:
            - icon: github.png
              href: https://github.com/lucawalz/horizon

  services.yaml: |
    - Network:
        - AdGuard Home:
            icon: adguard-home.png
            href: http://10.20.0.1:3000

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: false
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
