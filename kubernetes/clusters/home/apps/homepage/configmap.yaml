apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: syslabs
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      AI:
        style: row
        columns: 2
      Apps:
        style: row
        columns: 2
      Platform:
        style: row
        columns: 2

  docker.yaml: ""

  bookmarks.yaml: |
    - Cluster:
        - Rancher:
            - abbr: RA
              href: https://rancher.syslabs.dev
        - Grafana:
            - abbr: GR
              href: https://grafana.syslabs.dev

  services.yaml: |
    - AI:
        - Open WebUI:
            href: https://chat.syslabs.dev
            description: chat frontend
            siteMonitor: https://chat.syslabs.dev
        - LiteLLM:
            href: https://llm.syslabs.dev
            description: llm gateway
            siteMonitor: https://llm.syslabs.dev
    - Apps:
        - n8n:
            href: https://n8n.syslabs.dev
            description: workflow automation
            siteMonitor: https://n8n.syslabs.dev
        - pgAdmin:
            href: https://pgadmin.syslabs.dev
            description: postgres admin
            siteMonitor: https://pgadmin.syslabs.dev
    - Platform:
        - Grafana:
            href: https://grafana.syslabs.dev
            description: dashboards
            siteMonitor: https://grafana.syslabs.dev
        - Rancher:
            href: https://rancher.syslabs.dev
            description: cluster management
            siteMonitor: https://rancher.syslabs.dev

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
    - prometheus:
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
