apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-redis
  namespace: paperless
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "5.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      redis:
        containers:
          app:
            image:
              repository: docker.io/library/redis
              tag: "8"
            command:
              - redis-server
              - --save
              - ""
              - --appendonly
              - "no"
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: redis
        ports:
          redis:
            port: 6379
