apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-gpt
  namespace: paperless
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: app-template
      version: "5.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      paperless-gpt:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/icereed/paperless-gpt
              tag: "v0.25.1"
            env:
              PAPERLESS_BASE_URL: http://paperless-ngx.paperless.svc.cluster.local:8000
              PAPERLESS_PUBLIC_URL: https://paperless.syslabs.dev
              LLM_PROVIDER: ollama
              LLM_MODEL: llama3.2:3b
              OLLAMA_HOST: http://ollama.llm.svc.cluster.local:11434
              OLLAMA_CONTEXT_LENGTH: "8192"
              TOKEN_LIMIT: "1000"
              LLM_LANGUAGE: English
              OCR_PROVIDER: llm
              VISION_LLM_PROVIDER: ollama
              VISION_LLM_MODEL: minicpm-v:8b
              AUTO_OCR_TAG: paperless-gpt-ocr-auto
              AUTO_TAG: paperless-gpt-auto
              MANUAL_TAG: paperless-gpt-manual
              PDF_OCR_TAGGING: "true"
              PDF_OCR_COMPLETE_TAG: paperless-gpt-ocr-complete
              PDF_UPLOAD: "false"
              LOG_LEVEL: INFO
              PAPERLESS_API_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: paperless
                    key: PAPERLESS_API_TOKEN
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: "1000m"
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: paperless-gpt
        ports:
          http:
            port: 8080
    persistence:
      prompts:
        enabled: true
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /app/prompts
