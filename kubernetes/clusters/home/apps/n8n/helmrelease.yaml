apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: n8n
      version: "1.24.x"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    strategy:
      type: Recreate
    ingress:
      enabled: false
    main:
      livenessProbe:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 60
        periodSeconds: 10
        failureThreshold: 12
      readinessProbe:
        httpGet:
          path: /healthz/readiness
          port: http
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 6
      persistence:
        enabled: true
        size: 5Gi
        accessMode: ReadWriteOnce
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
