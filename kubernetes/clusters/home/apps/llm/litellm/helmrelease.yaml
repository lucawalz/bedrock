apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
  namespace: llm
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: litellm
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: litellm
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    fullnameOverride: litellm
    replicaCount: 1
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    env:
      HF_HOME: /tmp/hf
      TIKTOKEN_CACHE_DIR: /tmp/tiktoken
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
    service:
      type: ClusterIP
      port: 4000
    ingress:
      enabled: false
    secretFrom:
      name: litellm-secrets
    proxy_config:
      model_list:
        - model_name: qwen2.5-coder:7b
          litellm_params:
            model: ollama_chat/qwen2.5-coder:7b
            api_base: http://ollama.llm.svc.cluster.local:11434
        - model_name: llama3.1:8b
          litellm_params:
            model: ollama_chat/llama3.1:8b
            api_base: http://ollama.llm.svc.cluster.local:11434
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY
