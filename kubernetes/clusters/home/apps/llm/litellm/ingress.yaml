apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: litellm
  namespace: llm
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`llm.syslabs.dev`)
      kind: Rule
      middlewares:
        - name: litellm-root-redirect
      services:
        - name: litellm
          port: 4000
  tls: {}
