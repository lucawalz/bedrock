apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-db-init
  namespace: postgres
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: postgres-postgresql.postgres.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGDATABASE
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-postgresql
                  key: postgres-password
            - name: LITELLM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-db-init
                  key: litellm-db-password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              psql -v ON_ERROR_STOP=1 -v litellm_pw="$LITELLM_DB_PASSWORD" <<'SQL'
              SELECT format('CREATE ROLE litellm LOGIN PASSWORD %L', :'litellm_pw')
              WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'litellm')\gexec
              SELECT 'CREATE DATABASE litellm OWNER litellm'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'litellm')\gexec
              GRANT ALL PRIVILEGES ON DATABASE litellm TO litellm;
              SQL
