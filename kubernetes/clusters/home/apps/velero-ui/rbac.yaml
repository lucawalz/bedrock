apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero-ui-readonly
rules:
  - nonResourceURLs:
      - /readyz
      - /healthz
      - /livez
      - /version
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - namespaces
      - pods
      - pods/log
      - pods/status
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - velero.io
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-ui-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: velero-ui-readonly
subjects:
  - kind: ServiceAccount
    name: velero-ui
    namespace: velero
