apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: velero-dashboard-auth
  namespace: velero
spec:
  basicAuth:
    secret: velero-dashboard-auth
    removeHeader: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forward-auth
  namespace: velero
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: velero-ui
  namespace: velero
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Velero
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: velero.png
    gethomepage.dev/href: https://velero.syslabs.dev
    gethomepage.dev/podSelector: app.kubernetes.io/name=velero-ui
    gethomepage.dev/statusStyle: "dot"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`velero.syslabs.dev`)
      kind: Rule
      middlewares:
        - name: authentik-forward-auth
      services:
        - name: velero-ui
          port: 3000
  tls: {}
