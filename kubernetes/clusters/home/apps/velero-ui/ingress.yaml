apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: velero-ui
  namespace: velero
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Velero
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: velero.png
    gethomepage.dev/href: https://velero.syslabs.dev
    gethomepage.dev/podSelector: app.kubernetes.io/name=velero-ui
    gethomepage.dev/statusStyle: "dot"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`velero.syslabs.dev`)
      kind: Rule
      services:
        - name: velero-ui
          port: 3000
  tls: {}
