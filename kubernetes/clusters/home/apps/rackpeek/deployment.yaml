apiVersion: apps/v1
kind: Deployment
metadata:
  name: rackpeek
  namespace: rackpeek
  labels:
    app.kubernetes.io/name: rackpeek
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rackpeek
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rackpeek
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rackpeek
          image: aptacode/rackpeek:v2.0.0@sha256:3b82af1f323346d90ce76fe4b2ad2e72cf3a2413606bcdc606b2dc23aa90d523
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RPK_YAML_DIR
              value: /app/config
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: rackpeek-config
        - name: tmp
          emptyDir: {}
