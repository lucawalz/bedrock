apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ntfy
  namespace: ntfy
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: ntfy
      version: "0.5.17"
      sourceRef:
        kind: HelmRepository
        name: wrenix
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    ntfy:
      baseURL: https://ntfy.syslabs.dev
      behindProxy: true
      auth:
        defaultAccess: read-write
      cache:
        file: null
    persistence:
      enabled: false
    ingress:
      enabled: false
    networkPolicy:
      enabled: false
    service:
      http:
        port: 80
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
