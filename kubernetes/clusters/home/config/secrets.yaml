---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-secrets
  namespace: flux-system
spec:
  interval: 10m
  path: clusters/home
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: bedrock-secrets
  dependsOn:
    - name: cluster-namespaces
  decryption:
    provider: sops
    secretRef:
      name: sops-age
