---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-capi-aws
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/clusters/home/infrastructure/cluster-api/aws-1
  prune: true
  suspend: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-capi-providers
