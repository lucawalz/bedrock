---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: litellm-db-init
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/clusters/home/apps/llm/litellm/db-init
  prune: true
  wait: true
  force: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-infrastructure
    - name: cluster-namespaces
