---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-velero-aws-demo
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/clusters/home/infrastructure/storage/velero-aws-demo
  prune: true
  suspend: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-infrastructure
