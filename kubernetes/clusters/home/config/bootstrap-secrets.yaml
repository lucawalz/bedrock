---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-bootstrap-secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/clusters/home/bootstrap-secrets
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-namespaces
  decryption:
    provider: sops
    secretRef:
      name: sops-age
