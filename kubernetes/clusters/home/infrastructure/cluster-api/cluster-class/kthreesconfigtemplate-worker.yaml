apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KThreesConfigTemplate
metadata:
  name: default-worker
  namespace: caph-system
spec:
  template:
    spec:
      agentConfig:
        airGapped: true
      files:
        - path: /etc/tailscale/authkey
          owner: "root:root"
          permissions: "0400"
          contentFrom:
            secret:
              name: tailscale-peer-authkey
              key: authkey
