apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-autoscaler
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  targetNamespace: kube-system
  chart:
    spec:
      chart: cluster-autoscaler
      version: "9.57.0"
      sourceRef:
        kind: HelmRepository
        name: cluster-autoscaler
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    cloudProvider: hetzner
    autoscalingGroups:
      - name: elastic
        instanceType: cpx22
        region: hel1
        minSize: 0
        maxSize: 2
    extraArgs:
      scale-down-enabled: true
      scale-down-delay-after-add: 3m
      scale-down-unneeded-time: 3m
    extraEnvSecrets:
      HCLOUD_TOKEN:
        name: hcloud
        key: hcloud-token
      HCLOUD_CLUSTER_CONFIG:
        name: cluster-autoscaler-hcloud-config
        key: HCLOUD_CLUSTER_CONFIG
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  postRenderers:
    # chart exposes only podAnnotations; Reloader reads its trigger from Deployment metadata, so post-render it
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: placeholder
                annotations:
                  reloader.stakater.com/auto: "true"
