apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: ash
  namespace: caph-system
  labels:
    cluster-api.cattle.io/rancher-auto-import: "true"
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 10.42.0.0/16
    services:
      cidrBlocks:
        - 10.43.0.0/16
  topology:
    classRef:
      name: default
      namespace: caph-system
    version: v1.35.2+k3s1
    controlPlane:
      replicas: 1
    workers:
      machineDeployments:
        - class: default-worker
          name: md0
          replicas: 2
    variables:
      - name: region
        value: ash
      - name: networkZone
        value: us-east
      - name: controlPlaneMachineType
        value: cpx21
      - name: workerMachineType
        value: cpx21
