apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: bedrock
  namespace: flux-system
spec:
  interval: 10m
  url: https://github.com/lucawalz/bedrock.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: peer-base
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  sourceRef:
    kind: GitRepository
    name: bedrock
  path: ./kubernetes/peers/base
