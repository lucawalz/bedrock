apiVersion: apps/v1
kind: Deployment
metadata:
  name: horizon-controller
  namespace: caph-system
  labels:
    app.kubernetes.io/name: horizon-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: horizon-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: horizon-controller
    spec:
      serviceAccountName: horizon-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/lucawalz/horizon-controller:0.1.0
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
            - name: probe
              containerPort: 8081
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
