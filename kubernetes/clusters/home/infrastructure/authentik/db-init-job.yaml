apiVersion: batch/v1
kind: Job
metadata:
  name: authentik-db-init
  namespace: postgres
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik-db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: postgres-postgresql.postgres.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGDATABASE
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-postgresql
                  key: postgres-password
            - name: AUTHENTIK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-db-init
                  key: authentik-db-password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              psql -v ON_ERROR_STOP=1 -v authentik_pw="$AUTHENTIK_DB_PASSWORD" <<'SQL'
              SELECT format('CREATE ROLE authentik LOGIN PASSWORD %L', :'authentik_pw')
              WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authentik')\gexec
              SELECT 'CREATE DATABASE authentik OWNER authentik'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'authentik')\gexec
              GRANT ALL PRIVILEGES ON DATABASE authentik TO authentik;
              SQL
