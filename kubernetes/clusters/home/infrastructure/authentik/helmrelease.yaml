apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: "2026.5.3"
      sourceRef:
        kind: HelmRepository
        name: goauthentik
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    authentik:
      secret_key: ""
      error_reporting:
        enabled: false
      postgresql:
        host: postgres-postgresql.postgres.svc.cluster.local
        name: authentik
        user: authentik
        port: 5432
        password: ""
      redis:
        host: authentik-redis.authentik.svc.cluster.local
    blueprints:
      configMaps:
        - authentik-blueprints
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik
              key: secret-key
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik
              key: postgres-password
        - name: AUTHENTIK_BOOTSTRAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik
              key: bootstrap-password
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: authentik
              key: github-client-id
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: authentik
              key: github-client-secret
    server:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 768Mi
    worker:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 512Mi
