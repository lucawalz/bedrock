apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  github.yaml: |
    version: 1
    metadata:
      name: github-oauth-source
    entries:
      - model: authentik_sources_oauth.oauthsource
        identifiers:
          slug: github
        attrs:
          name: GitHub
          provider_type: github
          consumer_key: !Env GITHUB_CLIENT_ID
          consumer_secret: !Env GITHUB_CLIENT_SECRET
          additional_scopes: "user:email read:org"
          enrollment_flow: !Find [authentik_flows.flow, [slug, github-enrollment]]
          authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
  github-enrollment.yaml: |
    version: 1
    metadata:
      name: github-internal-enrollment
    entries:
      - model: authentik_stages_user_write.userwritestage
        identifiers:
          name: github-enrollment-write
        attrs:
          user_type: internal
          user_creation_mode: always_create
          create_users_as_inactive: false
      - model: authentik_flows.flow
        identifiers:
          slug: github-enrollment
        attrs:
          name: GitHub Enrollment
          title: GitHub Enrollment
          designation: enrollment
          authentication: none
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !Find [authentik_flows.flow, [slug, github-enrollment]]
          order: 0
        attrs:
          stage: !Find [authentik_stages_prompt.promptstage, [name, default-source-enrollment-prompt]]
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !Find [authentik_flows.flow, [slug, github-enrollment]]
          order: 1
        attrs:
          stage: !Find [authentik_stages_user_write.userwritestage, [name, github-enrollment-write]]
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !Find [authentik_flows.flow, [slug, github-enrollment]]
          order: 2
        attrs:
          stage: !Find [authentik_stages_user_login.userloginstage, [name, default-source-enrollment-login]]
  github-identification.yaml: |
    version: 1
    metadata:
      name: github-identification-binding
    entries:
      - model: authentik_stages_identification.identificationstage
        identifiers:
          name: default-authentication-identification
        attrs:
          user_fields: []
          sources:
            - !Find [authentik_core.source, [slug, authentik-built-in]]
            - !Find [authentik_core.source, [slug, github]]
  github-restriction.yaml: |
    version: 1
    metadata:
      name: github-single-user-restriction
    entries:
      - model: authentik_policies_expression.expressionpolicy
        id: restrict-github-policy
        identifiers:
          name: restrict-github-single-user
        attrs:
          expression: |
            ui = request.context.get("oauth_userinfo") or {}
            pd = request.context.get("prompt_data") or {}
            pu = request.context.get("pending_user")
            candidates = [ui.get("login"), pd.get("username"), getattr(pu, "username", None)]
            ak_logger.info("github-restrict-context", oauth=ui, prompt=pd, candidates=candidates)
            if "lucawalz" in [c for c in candidates if c]:
                return True
            ak_message("This authentik instance is restricted to a single account.")
            return False
      - model: authentik_policies.policybinding
        id: restrict-github-enrollment-binding
        identifiers:
          target: !Find [authentik_flows.flow, [slug, github-enrollment]]
          policy: !KeyOf restrict-github-policy
          order: 0
        attrs:
          enabled: true
      - model: authentik_policies.policybinding
        id: restrict-github-auth-binding
        identifiers:
          target: !Find [authentik_flows.flow, [slug, default-source-authentication]]
          policy: !KeyOf restrict-github-policy
          order: 0
        attrs:
          enabled: true
