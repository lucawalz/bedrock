apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forward-auth
  namespace: cattle-system
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rancher
  namespace: cattle-system
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Rancher
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: rancher.png
    gethomepage.dev/href: https://rancher.syslabs.dev
    gethomepage.dev/podSelector: app=rancher
    gethomepage.dev/statusStyle: "dot"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`rancher.syslabs.dev`)
      kind: Rule
      middlewares:
        - name: rancher-forwarded-proto
        - name: authentik-forward-auth
      services:
        - name: rancher
          port: 80
  tls: {}