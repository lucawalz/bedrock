apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rancher
  namespace: cattle-system
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Rancher
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: rancher.png
    gethomepage.dev/href: https://rancher.syslabs.dev
    gethomepage.dev/siteMonitor: https://rancher.syslabs.dev
    gethomepage.dev/statusStyle: "dot"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`rancher.syslabs.dev`)
      kind: Rule
      middlewares:
        - name: rancher-forwarded-proto
      services:
        - name: rancher
          port: 80
  tls: {}