apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare-tunnel
data:
  config.yaml: |
    tunnel: ac17ab2d-695c-4b3a-a671-5379017c6910
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    protocol: http2
    originRequest:
      originServerName: chat.syslabs.dev
    ingress:
      - hostname: chat.syslabs.dev
        service: https://traefik.traefik.svc.cluster.local:443
      - hostname: llm.syslabs.dev
        service: https://traefik.traefik.svc.cluster.local:443
      - hostname: n8n.syslabs.dev
        service: https://traefik.traefik.svc.cluster.local:443
      - hostname: lucawalz.dev
        service: https://traefik.traefik.svc.cluster.local:443
        originRequest:
          # apex is outside the *.syslabs.dev wildcard cert Traefik serves
          noTLSVerify: true
      - service: http_status:404
