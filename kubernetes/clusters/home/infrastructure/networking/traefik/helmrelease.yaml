apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: traefik
      version: "41.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    service:
      spec:
        type: LoadBalancer
      annotations:
        metallb.io/loadBalancerIPs: 10.20.0.50
    ports:
      web:
        nodePort: 30080
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        nodePort: 30443
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    tlsStore:
      default:
        defaultCertificate:
          secretName: wildcard-syslabs-dev-tls
    metrics:
      prometheus:
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        service:
          enabled: true
        serviceMonitor:
          enabled: true
          interval: 60s
          honorLabels: true
          additionalLabels:
            release: kube-prometheus-stack
  install:
    createNamespace: true
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
