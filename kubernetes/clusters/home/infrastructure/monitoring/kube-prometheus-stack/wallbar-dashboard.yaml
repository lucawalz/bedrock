apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-wallbar
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  wallbar.json: |
    {
      "annotations": { "list": [] },
      "editable": false,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        { "datasource": { "type": "prometheus", "uid": "prometheus" }, "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "decimals": 0, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 70 }, { "color": "red", "value": 90 } ] } }, "overrides": [] }, "gridPos": { "h": 13, "w": 6, "x": 0, "y": 0 }, "id": 1, "options": { "showThresholdLabels": false, "showThresholdMarkers": false, "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "text": { "valueSize": 36, "titleSize": 16 } }, "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "100*(1-avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))", "refId": "A" } ], "title": "CPU", "type": "gauge" },
        { "datasource": { "type": "prometheus", "uid": "prometheus" }, "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "decimals": 0, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 80 }, { "color": "red", "value": 92 } ] } }, "overrides": [] }, "gridPos": { "h": 13, "w": 6, "x": 6, "y": 0 }, "id": 2, "options": { "showThresholdLabels": false, "showThresholdMarkers": false, "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "text": { "valueSize": 36, "titleSize": 16 } }, "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "100*(1-sum(node_memory_MemAvailable_bytes)/sum(node_memory_MemTotal_bytes))", "refId": "A" } ], "title": "Memory", "type": "gauge" },
        { "datasource": { "type": "prometheus", "uid": "prometheus" }, "fieldConfig": { "defaults": { "unit": "none", "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 3 } ] } }, "overrides": [] }, "gridPos": { "h": 6, "w": 4, "x": 12, "y": 0 }, "id": 3, "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "text": { "valueSize": 34, "titleSize": 13 } }, "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"true\"} == 1)", "refId": "A" } ], "title": "Nodes Ready", "type": "stat" },
        { "datasource": { "type": "prometheus", "uid": "prometheus" }, "fieldConfig": { "defaults": { "unit": "none", "color": { "mode": "fixed", "fixedColor": "blue" }, "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": null } ] } }, "overrides": [] }, "gridPos": { "h": 6, "w": 4, "x": 16, "y": 0 }, "id": 4, "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "text": { "valueSize": 34, "titleSize": 13 } }, "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)", "refId": "A" } ], "title": "Pods", "type": "stat" },
        { "datasource": { "type": "prometheus", "uid": "prometheus" }, "fieldConfig": { "defaults": { "unit": "none", "color": { "mode": "fixed", "fixedColor": "blue" }, "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": null } ] } }, "overrides": [] }, "gridPos": { "h": 6, "w": 4, "x": 20, "y": 0 }, "id": 5, "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "text": { "valueSize": 34, "titleSize": 13 } }, "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "count(kube_deployment_spec_replicas)", "refId": "A" } ], "title": "Deployments", "type": "stat" },
        { "datasource": { "type": "prometheus", "uid": "prometheus" }, "fieldConfig": { "defaults": { "unit": "none", "mappings": [ { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } } ], "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] } }, "overrides": [] }, "gridPos": { "h": 7, "w": 4, "x": 12, "y": 6 }, "id": 6, "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "text": { "valueSize": 34, "titleSize": 13 } }, "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "min(up{job=\"pi-router\"})", "refId": "A" } ], "title": "Pi Router", "type": "stat" },
        { "datasource": { "type": "prometheus", "uid": "prometheus" }, "fieldConfig": { "defaults": { "unit": "none", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] } }, "overrides": [] }, "gridPos": { "h": 7, "w": 4, "x": 16, "y": 6 }, "id": 7, "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "text": { "valueSize": 34, "titleSize": 13 } }, "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "count(ALERTS{alertstate=\"firing\",alertname!=\"Watchdog\"}) or vector(0)", "refId": "A" } ], "title": "Firing Alerts", "type": "stat" },
        { "datasource": { "type": "prometheus", "uid": "prometheus" }, "fieldConfig": { "defaults": { "unit": "none", "color": { "mode": "fixed", "fixedColor": "blue" }, "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": null } ] } }, "overrides": [] }, "gridPos": { "h": 7, "w": 4, "x": 20, "y": 6 }, "id": 8, "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "text": { "valueSize": 34, "titleSize": 13 } }, "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "count(kube_replicaset_spec_replicas > 0)", "refId": "A" } ], "title": "ReplicaSets", "type": "stat" }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["wallbar", "kiosk"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "",
      "title": "Wall Status",
      "uid": "wallbar",
      "version": 4
    }
