apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-slo-blog
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  slo-blog.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 0.1 },
                  { "color": "green", "value": 0.25 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slo:blog_availability:error_budget_remaining_ratio",
              "refId": "A"
            }
          ],
          "title": "Availability error budget remaining (30d)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 0.1 },
                  { "color": "green", "value": 0.25 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slo:blog_latency:error_budget_remaining_ratio",
              "refId": "A"
            }
          ],
          "title": "Latency error budget remaining (30d)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "none", "custom": { "drawStyle": "line", "fillOpacity": 10 } },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slo:blog_availability:error_ratio{window=\"1h\"} / (1 - 0.999)",
              "legendFormat": "availability burn rate (1h)",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slo:blog_latency:error_ratio{window=\"1h\"} / (1 - 0.99)",
              "legendFormat": "latency burn rate (1h)",
              "refId": "B"
            }
          ],
          "title": "Burn rate (1h window, multiples of budget)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "drawStyle": "line", "fillOpacity": 10 } },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "id": 4,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "1 - slo:blog_availability:error_ratio{window=\"1h\"}",
              "legendFormat": "availability SLI (1h)",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "1 - slo:blog_latency:error_ratio{window=\"1h\"}",
              "legendFormat": "latency SLI (1h)",
              "refId": "B"
            }
          ],
          "title": "SLI over time (1h window)",
          "type": "timeseries"
        }
      ],
      "refresh": "1m",
      "schemaVersion": 39,
      "tags": ["slo", "blog"],
      "templating": { "list": [] },
      "time": { "from": "now-7d", "to": "now" },
      "timezone": "",
      "title": "Blog SLO / Error Budget",
      "uid": "blog-slo",
      "version": 1
    }
