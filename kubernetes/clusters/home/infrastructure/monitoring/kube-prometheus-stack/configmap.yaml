apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-values
  namespace: monitoring
data:
  values.yaml: |
    # kube-prometheus-stack Helm values
    # See: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

    # Reduce resource usage for homelab
    prometheus:
      prometheusSpec:
        retention: 7d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        additionalScrapeConfigs:
          - job_name: pi-router
            scrape_interval: 30s
            static_configs:
              - targets:
                  - "10.20.0.1:9100"
                  - "10.20.0.1:9586"
            relabel_configs:
              - source_labels: [__address__]
                target_label: instance
                replacement: pi-router

    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false

    grafana:
      enabled: true
      image:
        tag: "11.2.3"
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password

      persistence:
        enabled: true
        size: 10Gi
        storageClassName: longhorn

      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    alertmanager:
      enabled: true
      alertmanagerSpec:
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: 'ntfy'
          group_by: ['alertname', 'severity']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: 'null'
              matchers:
                - alertname =~ "InfoInhibitor|Watchdog"
        receivers:
          - name: 'null'
          - name: 'ntfy'
            webhook_configs:
              - url: 'http://ntfy.ntfy.svc.cluster.local/alerts?tpl=yes&title=%7B%7B.status%20%7C%20upper%7D%7D%3A%20%7B%7B.commonLabels.alertname%7D%7D%20%28%7B%7Blen%20.alerts%7D%7D%29&message=%7B%7B.commonLabels.severity%7D%7D%20%7C%20%7B%7B.commonAnnotations.summary%20%7C%20trunc%20200%7D%7D'
                send_resolved: true
        inhibit_rules:
          - source_matchers:
              - severity = critical
            target_matchers:
              - severity =~ warning|info
            equal:
              - namespace
              - alertname