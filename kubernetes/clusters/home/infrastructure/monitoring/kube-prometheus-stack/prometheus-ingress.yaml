apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Prometheus
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: prometheus.png
    gethomepage.dev/href: https://prometheus.syslabs.dev
    gethomepage.dev/podSelector: app.kubernetes.io/name=prometheus
    gethomepage.dev/statusStyle: "dot"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`prometheus.syslabs.dev`)
      kind: Rule
      middlewares:
        - name: monitoring-dashboard-auth
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
  tls: {}
