---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  chart:
    spec:
      chart: longhorn
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      version: 1.12.0
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
      remediateLastFailure: true
  interval: 30m0s
  storageNamespace: longhorn-system
  targetNamespace: longhorn-system
  values:
    longhornManager:
      nodeSelector:
        bedrock.io/storage: "true"
    longhornDriver:
      nodeSelector:
        bedrock.io/storage: "true"
    longhornUI:
      replicas: 1
      nodeSelector:
        bedrock.io/storage: "true"
    defaultSettings:
      createDefaultDiskLabeledNodes: true
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 3
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      systemManagedComponentsNodeSelector: "bedrock.io/storage:true"
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 3
