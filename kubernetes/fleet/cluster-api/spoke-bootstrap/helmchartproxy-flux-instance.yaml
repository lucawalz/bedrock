apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: spoke-flux-instance
  namespace: caph-system
spec:
  clusterSelector:
    matchLabels:
      bedrock.syslabs.dev/gitops: "true"
  repoURL: oci://ghcr.io/controlplaneio-fluxcd/charts
  chartName: flux-instance
  version: "0.53.0"
  releaseName: flux-instance
  namespace: flux-system
  options:
    wait: true
    timeout: 5m
  valuesTemplate: |
    instance:
      distribution:
        version: "2.8.x"
        registry: "ghcr.io/fluxcd"
      components:
        - source-controller
        - kustomize-controller
      cluster:
        type: kubernetes
        networkPolicy: true
        domain: cluster.local
      sync:
        kind: GitRepository
        url: "https://github.com/lucawalz/bedrock"
        ref: "refs/heads/main"
        path: "kubernetes/clusters/{{ .Cluster.metadata.name }}"
