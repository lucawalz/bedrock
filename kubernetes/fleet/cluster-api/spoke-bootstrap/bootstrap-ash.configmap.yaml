apiVersion: v1
kind: ConfigMap
metadata:
  name: spoke-bootstrap-ash
  namespace: caph-system
data:
  blog.yaml: |
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: GitRepository
    metadata:
      name: flux-system
      namespace: flux-system
    spec:
      interval: 5m
      url: https://github.com/lucawalz/bedrock
      ref:
        branch: main
    ---
    apiVersion: v1
    kind: Namespace
    metadata:
      name: blog
    ---
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: region-ash
      namespace: flux-system
    data:
      region: ash
      zone: us-east
      profile: edge-cloud
      domain: ash.syslabs.dev
    ---
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: blog
      namespace: flux-system
    spec:
      interval: 10m
      path: ./kubernetes/apps/blog/overlays/edge-cloud
      prune: true
      wait: true
      sourceRef:
        kind: GitRepository
        name: flux-system
      postBuild:
        substituteFrom:
          - kind: ConfigMap
            name: region-ash
