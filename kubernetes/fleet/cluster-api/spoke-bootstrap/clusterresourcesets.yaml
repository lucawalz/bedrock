apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: spoke-hel1
  namespace: caph-system
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: hel1
  resources:
    - name: spoke-flux-install
      kind: ConfigMap
    - name: spoke-bootstrap-hel1
      kind: ConfigMap
    - name: spoke-cloudflared-hel1
      kind: Secret
---
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: spoke-ash
  namespace: caph-system
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: ash
  resources:
    - name: spoke-flux-install
      kind: ConfigMap
    - name: spoke-bootstrap-ash
      kind: ConfigMap
    - name: spoke-cloudflared-ash
      kind: Secret
