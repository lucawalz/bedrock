apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ntfy
  namespace: ntfy
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: app-template
      version: "5.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      ntfy:
        containers:
          app:
            image:
              repository: docker.io/binwiederhier/ntfy
              tag: v2.26.0
            args:
              - serve
            env:
              NTFY_BASE_URL: https://ntfy.${cluster_domain}
              NTFY_BEHIND_PROXY: "true"
              NTFY_AUTH_DEFAULT_ACCESS: read-write
              NTFY_CACHE_FILE: ""
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_BIND_SERVICE
    service:
      app:
        controller: ntfy
        ports:
          http:
            port: 80
