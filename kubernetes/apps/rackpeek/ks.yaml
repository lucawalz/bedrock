apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rackpeek
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/rackpeek/app
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-edge-onprem
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
    substitute:
      APP: rackpeek
      APP_PORT: "8080"
