apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  namespace: n8n
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: n8n
    gethomepage.dev/group: Apps
    gethomepage.dev/icon: n8n.png
    gethomepage.dev/href: https://n8n.syslabs.dev
    gethomepage.dev/podSelector: app.kubernetes.io/name=n8n
    gethomepage.dev/statusStyle: "dot"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`n8n.syslabs.dev`)
      kind: Rule
      services:
        - name: n8n
          port: 5678
  tls: {}
