apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: llm
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: open-webui
      version: "15.2.x"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    fullnameOverride: open-webui
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
    livenessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 6
    readinessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 6
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    ollama:
      enabled: false
    ollamaUrls:
      - http://ollama.llm.svc.cluster.local:11434
      - http://ollama-vision.llm.svc.cluster.local:11434
    pipelines:
      enabled: false
    websocket:
      enabled: false
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn
      accessModes:
        - ReadWriteOnce
    ingress:
      enabled: false
    service:
      type: ClusterIP
      port: 80
