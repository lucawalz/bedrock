apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: llm
spec:
  interval: 30m
  timeout: 60m
  chart:
    spec:
      chart: ollama
      version: "1.65.x"
      sourceRef:
        kind: HelmRepository
        name: ollama
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    ollama:
      gpu:
        enabled: false
      models:
        pull:
          - llama3.2:3b
          - qwen2.5:7b
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    service:
      type: ClusterIP
      port: 11434
    ingress:
      enabled: false
    persistentVolume:
      enabled: true
      size: 30Gi
      storageClass: longhorn-disposable
      accessModes:
        - ReadWriteOnce
    nodeSelector:
      kubernetes.io/hostname: worker-1
    resources:
      requests:
        cpu: "1000m"
        memory: "4Gi"
      limits:
        cpu: "4000m"
        memory: "16Gi"
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: ollama
            patch: |
              - op: add
                path: /spec/progressDeadlineSeconds
                value: 3600
