apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama-vision
  namespace: llm
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: ollama
      version: "1.65.x"
      sourceRef:
        kind: HelmRepository
        name: ollama
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    ollama:
      gpu:
        enabled: false
      models:
        pull:
          - minicpm-v:8b
          - llama3.2:3b
    extraEnv:
      - name: OLLAMA_MAX_LOADED_MODELS
        value: "1"
      - name: OLLAMA_KEEP_ALIVE
        value: "5m"
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    service:
      type: ClusterIP
      port: 11434
    ingress:
      enabled: false
    persistentVolume:
      enabled: true
      size: 30Gi
      storageClass: longhorn-disposable
      accessModes:
        - ReadWriteOnce
    nodeSelector:
      kubernetes.io/hostname: worker-2
    resources:
      requests:
        cpu: "1000m"
        memory: "4Gi"
      limits:
        cpu: "10000m"
        memory: "9Gi"
